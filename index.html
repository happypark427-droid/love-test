<html lang="ko">
<head>

  <title>연애력 테스트</title>
  <link rel="stylesheet" href="style.css">

  <script>
    if (typeof Kakao !== 'undefined') {
      if (!Kakao.isInitialized()) {
        Kakao.init('eaf3a52f62166963eb2f76a5f5348681');
        console.log('카카오 SDK 초기화 성공:', Kakao.isInitialized());
      }
    }
  </script>
  
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<body>

<div id="start-screen">
  <h1>연애력 테스트</h1>
  <img src="image.png" alt="메인 이미지" id="main-image">
  <button onclick="startTest()">시작하기</button>
</div>

<div id="question-box" class="hidden">
  <div id="progress"></div>
  <h2 id="question"></h2>
  <div id="buttons"></div> <button class="prev-btn" onclick="prevQuestion()" id="prev-button">이전으로</button>
</div>

<div id="result-box" class="hidden">
  <h2 id="result-title"></h2>
  <div id="result-desc">결과 상세 내용...</div>
  
  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
  
  <div class="detail-container">
    <h3 style="font-size: 18px; color: #333; margin-bottom: 10px;">🔍 나만을 위한 맞춤 분석</h3>
    <p id="result-detail" style="line-height: 1.6; color: #555; text-align: left; background: #fdfdfd; padding: 15px; border-radius: 10px;"></p>
  </div>
  
  <div class="btn-container">
    <button class="share-btn" onclick="shareKakao()">카톡으로 공유하기</button>
    <button class="save-btn" onclick="saveResult()">화면 저장</button>
  </div>

  </div>
</div>

</html>
