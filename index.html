<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연애력 테스트</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="style.css">
  
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.1/kakao.min.js" integrity="sha384-kDljxUXHaJ9xAb2AzRd59KxjrFjzHa5TAoFQ6GbYTCAG0bjM55XohjjDT7tDDC01" crossorigin="anonymous"></script>
  <script>

      }
    }
  </script>
  
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<div id="start-screen">
  <h1>연애력 테스트 남자버전</h1>
  <img src="image.png" alt="메인 이미지" id="main-image">
  <p class="intro-text">
    당신이 연애를 잘한다면 내 점수가 어느정도나 나올까 풀어보고 당신이 연애를 잘 못한다면 이걸 풀고 결과지를 받아 답안을 본 후에 연애력이 올라가기를 바란다. <br><span>-제작자-</span>
  </p>
  <button onclick="startTest()">시작하기</button>
  <div style="text-align: center; margin-top: 30px;">
  <ins class="kakao_ad_area" style="display:none;"
data-ad-unit = "DAN-DwGM4YkDO7m3E6G6"
data-ad-width = "320"
data-ad-height = "100"></ins>
<script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
 </div>
</div>

<div id="question-box" class="hidden">
  <div id="progress"></div>
 <div class="question-ad" style="margin-top: 10px; margin-bottom: 20px; text-align: center; min-height: 100px;">
  <ins class="kakao_ad_area" style="display:none;"  
data-ad-unit = "DAN-DwGM4YkDO7m3E6G6"
data-ad-width = "320"
data-ad-height = "100"></ins>
<script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script>
</div>
  <h2 id="question"></h2>
  <div id="buttons"></div> <button class="prev-btn" onclick="prevQuestion()" id="prev-button">이전으로</button>
</div>

<div id="result-box" class="hidden">
  <h2 id="result-title"></h2>
  <div id="result-desc">결과 상세 내용...</div>
  
  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
  
  <div class="detail-container">
    <h3 style="font-size: 36px; color: #000000; margin-bottom: 15px;">🔍 나만을 위한 맞춤 분석</h3>
    <p id="result-detail" style="line-height: 1.6; font-size: 20px; color: #000000; text-align:  left; background: #f8d6d6; padding: 15px; border-radius: 15px;"></p>
  </div>
  
  <div class="btn-container">
    <button class="share-btn" onclick="shareKakao()">카톡으로 공유하기</button>
    <button class="save-btn" onclick="saveResult()">화면 저장</button>
    <button class="restart-btn" onclick="restartTest()">다시 테스트하기</button>
  </div>

  <div class="coupang-ad">
    <iframe src="https://coupa.ng/cmKwDA" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe> 
    <iframe src="https://coupa.ng/cmWxdm" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>
    <iframe src="https://coupa.ng/cmWwXW" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>
    <p class="ad-notice">이 포스팅은 쿠팡 파트너스 활동의 일환으로, <br>이에 따른 일정액의 수수료를 제공받습니다.</p>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
